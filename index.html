<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherTempo — Christchurch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- ── Header ───────────────────────────────────────────────────────── -->
    <header class="header">
      <div class="header-inner">
        <div class="location">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
          <span id="location-name">Christchurch, New Zealand</span>
        </div>
        <div class="updated" id="last-updated">—</div>
      </div>
    </header>

    <!-- ── Conditions Card ──────────────────────────────────────────────── -->
    <section class="card conditions-card">

      <!-- Row 1: current temp + today high/low -->
      <div class="cond-top">
        <div class="cond-main">
          <div class="current-temp" id="current-temp">—°</div>
          <div class="current-detail">
            <div class="current-condition" id="current-condition">—</div>
            <div class="current-feels" id="current-feels">Feels like —°</div>
          </div>
        </div>
        <div class="high-low">
          <div class="hl-item">
            <svg class="hl-arrow up" viewBox="0 0 16 16"><path d="M8 2l5 7H3z"/></svg>
            <span class="hl-temp" id="today-high">—°</span>
            <span class="hl-time" id="today-high-time">—</span>
          </div>
          <div class="hl-item">
            <svg class="hl-arrow down" viewBox="0 0 16 16"><path d="M8 14l5-7H3z"/></svg>
            <span class="hl-temp" id="today-low">—°</span>
            <span class="hl-time" id="today-low-time">—</span>
          </div>
        </div>
      </div>

      <!-- Row 2: stats grid -->
      <div class="stats-grid">
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
            <path d="M19 10a7 7 0 0 1-14 0"/>
          </svg>
          <span class="stat-value" id="humidity">—%</span>
          <span class="stat-label">Humidity</span>
        </div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 8h8a4 4 0 0 1 0 8H5"/>
            <path d="M3 12h2M9 4l-2 4M15 4l2 4"/>
          </svg>
          <span class="stat-value" id="wind">— km/h</span>
          <span class="stat-label wind-dir" id="wind-dir">—</span>
        </div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="9"/>
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 3v3M12 18v3M3 12h3M18 12h3"/>
          </svg>
          <span class="stat-value" id="pressure">— hPa</span>
          <span class="stat-label">Pressure</span>
        </div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
          </svg>
          <span class="stat-value" id="uv-index">—</span>
          <span class="stat-label" id="uv-label">UV</span>
        </div>
      </div>

      <!-- Row 3: astronomy -->
      <div class="astro-row">
        <div class="astro-item">
          <svg class="astro-icon sunrise" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2v4M4.22 10.22l2.83 2.83M1 18h22M17.95 13.05l2.83-2.83"/>
            <path d="M5 18a7 7 0 0 1 14 0"/>
            <path d="M12 6l-3 4h6l-3-4z" fill="currentColor" stroke="none"/>
          </svg>
          <div>
            <div class="astro-label">Sunrise</div>
            <div class="astro-value" id="sunrise">—</div>
          </div>
        </div>
        <div class="astro-sep"></div>
        <div class="astro-item">
          <svg class="astro-icon sunset" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 6v4M4.22 10.22l2.83 2.83M1 18h22M17.95 13.05l2.83-2.83"/>
            <path d="M5 18a7 7 0 0 1 14 0"/>
            <path d="M12 10l3-4H9l3 4z" fill="currentColor" stroke="none"/>
          </svg>
          <div>
            <div class="astro-label">Sunset</div>
            <div class="astro-value" id="sunset">—</div>
          </div>
        </div>
        <div class="astro-sep"></div>
        <div class="astro-item">
          <span class="moon-emoji" id="moon-emoji">🌕</span>
          <div>
            <div class="astro-label">Moon</div>
            <div class="astro-value" id="moon-phase">—</div>
          </div>
        </div>
      </div>

      <!-- Row 4: tides -->
      <div class="tides-section">
        <div class="tides-header">
          <svg class="tide-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 18c2-4 4-4 6 0s4 4 6 0 4-4 6 0"/>
            <path d="M2 13c2-4 4-4 6 0s4 4 6 0 4-4 6 0"/>
          </svg>
          New Brighton Beach — Tides
        </div>
        <div class="tides-list" id="tides-list">
          <span class="tide-loading">Computing…</span>
        </div>
        <canvas id="tide-mini-chart" width="280" height="56"></canvas>
      </div>

    </section>

  </div><!-- .app -->

  <!-- ── Chart (full-width, outside .app constraint) ──────────────────── -->
  <section class="chart-section">
    <div class="chart-scroll" id="chart-scroll">
      <canvas id="weather-chart"></canvas>
    </div>
    <div class="chart-legend">
      <span class="legend-item temp">Temperature</span>
      <span class="legend-item feels">Feels like</span>
      <span class="legend-item precip">Precipitation</span>
      <span class="legend-item pressure">Pressure</span>
    </div>
  </section>

  <script src="src/tides.js"></script>
  <script src="src/chart.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
